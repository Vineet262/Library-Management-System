# Library Management System - Runtime Configuration
# =====================================================
# These values are read at startup. Editing them requires
# recompiling the application (they are constants in code).
#
# Fine per overdue day  : $0.50  (Book.FINE_PER_DAY)
# Max books per member  : 5      (Member.MAX_BORROW_LIMIT)
# Loan period (weeks)   : 2      (Library.LOAN_PERIOD_WEEKS)
#
# Data directory        : data/
#   books.txt           -- pipe-delimited book records
#   members.txt         -- pipe-delimited member records
#   books_export.csv    -- generated by Export to CSV menu
#   members_export.csv  -- generated by Export to CSV menu
